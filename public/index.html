<!DOCTYPE html>
<html>
<body>
    <div id="chat" style="height:300px; border:1px solid #ccc; overflow-y:scroll;"></div>
    <input id="msg" type="text" placeholder="Type a message...">
    <div style="margin-top:8px;">
        <input id="pdfFile" type="file" accept="application/pdf,.pdf">
    </div>
    <button onclick="send()">Send</button>
    <button id="disconnectBtn" onclick="disconnectCustomer()">Disconnect</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const visitorId = "visitor-" + Math.floor(Math.random() * 1000);

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderMessage(sender, text, attachments) {
            const safeText = text ? `<div>${escapeHtml(text)}</div>` : '';
            const safeAttachments = Array.isArray(attachments) && attachments.length > 0
                ? `<ul>${attachments.map((attachment) => {
                    const href = escapeHtml(attachment.url);
                    const label = escapeHtml(attachment.filename || 'document.pdf');
                    return `<li><a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a></li>`;
                }).join('')}</ul>`
                : '';
            document.getElementById('chat').innerHTML += `<p><b>${escapeHtml(sender)}:</b> ${safeText}${safeAttachments}</p>`;
        }

        // Receive from Agent
        socket.on('agent-reply', (message) => {
            if (typeof message === 'string') {
                renderMessage('Agent', message, []);
                return;
            }
            renderMessage(message.agentName || 'Agent', message.text, message.attachments || []);
        });

        // Send to Middleware
        async function send() {
            const text = document.getElementById('msg').value.trim();
            const pdfFileInput = document.getElementById('pdfFile');
            const selectedFile = pdfFileInput.files && pdfFileInput.files[0] ? pdfFileInput.files[0] : null;
            const attachments = [];

            if (selectedFile) {
                if (!/\.pdf$/i.test(selectedFile.name || '')) {
                    document.getElementById('chat').innerHTML += `<p><i>Only PDF files are allowed.</i></p>`;
                    return;
                }
                if (selectedFile.size > 25 * 1024 * 1024) {
                    document.getElementById('chat').innerHTML += `<p><i>PDF exceeds 25 MB limit.</i></p>`;
                    return;
                }

                try {
                    const formData = new FormData();
                    formData.append('file', selectedFile, selectedFile.name || 'document.pdf');
                    const uploadRes = await fetch('/upload-pdf', {
                        method: 'POST',
                        body: formData
                    });
                    const uploadBody = await uploadRes.json();
                    if (!uploadRes.ok || !uploadBody || !uploadBody.url) {
                        const reason = uploadBody && uploadBody.error ? uploadBody.error : `Upload failed (${uploadRes.status})`;
                        document.getElementById('chat').innerHTML += `<p><i>${escapeHtml(reason)}</i></p>`;
                        return;
                    }
                    attachments.push({
                        url: uploadBody.url,
                        filename: uploadBody.filename || selectedFile.name || 'document.pdf',
                        contentSizeBytes: uploadBody.contentSizeBytes || selectedFile.size
                    });
                } catch {
                    document.getElementById('chat').innerHTML += `<p><i>Upload failed: network error.</i></p>`;
                    return;
                }
            }

            if (!text && !selectedFile) {
                return;
            }

            renderMessage('You', text || (attachments.length > 0 ? 'PDF document attached' : ''), attachments);
            await fetch('/send-to-genesys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text,
                    visitorId,
                    ...(attachments.length > 0 ? {
                        attachmentUrl: attachments[0].url,
                        attachmentFilename: attachments[0].filename,
                        contentSizeBytes: attachments[0].contentSizeBytes
                    } : {})
                })
            });
            document.getElementById('msg').value = '';
            document.getElementById('pdfFile').value = '';
        }

        async function disconnectCustomer() {
            const btn = document.getElementById('disconnectBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/disconnect-customer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ visitorId, visitorNickname: 'Web Customer' })
                });

                if (res.ok) {
                    document.getElementById('chat').innerHTML += `<p><i>Chat disconnected by customer.</i></p>`;
                    document.getElementById('msg').disabled = true;
                } else {
                    const reason = await res.text();
                    document.getElementById('chat').innerHTML += `<p><i>Disconnect failed: ${reason}</i></p>`;
                    btn.disabled = false;
                }
            } catch (e) {
                document.getElementById('chat').innerHTML += `<p><i>Disconnect failed: network error</i></p>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
