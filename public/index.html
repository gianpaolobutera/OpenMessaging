<!DOCTYPE html>
<html>
<body>
    <div id="chat" style="height:300px; border:1px solid #ccc; overflow-y:scroll;"></div>
    <input id="msg" type="text" placeholder="Type a message...">
    <button onclick="send()">Send</button>
    <button id="disconnectBtn" onclick="disconnectCustomer()">Disconnect</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const visitorId = "visitor-" + Math.floor(Math.random() * 1000);

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderMessage(sender, text, attachments) {
            const safeText = text ? `<div>${escapeHtml(text)}</div>` : '';
            const safeAttachments = Array.isArray(attachments) && attachments.length > 0
                ? `<ul>${attachments.map((attachment) => {
                    const href = escapeHtml(attachment.url);
                    const label = escapeHtml(attachment.filename || 'document.pdf');
                    return `<li><a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a></li>`;
                }).join('')}</ul>`
                : '';
            document.getElementById('chat').innerHTML += `<p><b>${escapeHtml(sender)}:</b> ${safeText}${safeAttachments}</p>`;
        }

        // Receive from Agent
        socket.on('agent-reply', (message) => {
            if (typeof message === 'string') {
                renderMessage('Agent', message, []);
                return;
            }
            renderMessage(message.agentName || 'Agent', message.text, message.attachments || []);
        });

        // Send to Middleware
        async function send() {
            const text = document.getElementById('msg').value;
            renderMessage('You', text, []);
            await fetch('/send-to-genesys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text, visitorId })
            });
            document.getElementById('msg').value = '';
        }

        async function disconnectCustomer() {
            const btn = document.getElementById('disconnectBtn');
            btn.disabled = true;
            try {
                const res = await fetch('/disconnect-customer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ visitorId, visitorNickname: 'Web Customer' })
                });

                if (res.ok) {
                    document.getElementById('chat').innerHTML += `<p><i>Chat disconnected by customer.</i></p>`;
                    document.getElementById('msg').disabled = true;
                } else {
                    const reason = await res.text();
                    document.getElementById('chat').innerHTML += `<p><i>Disconnect failed: ${reason}</i></p>`;
                    btn.disabled = false;
                }
            } catch (e) {
                document.getElementById('chat').innerHTML += `<p><i>Disconnect failed: network error</i></p>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
